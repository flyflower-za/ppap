services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ppap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ppap
      POSTGRES_USER: ppap
      POSTGRES_PASSWORD: ppap123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ppap" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ppap-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ppap-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ppap-backend
    restart: unless-stopped
    environment:
      PORT: "31234"
      DATABASE_URL: postgresql+asyncpg://ppap:ppap123@postgres:5432/ppap
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "31234:31234"
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "31234" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend/app:/app/app

  # Frontend (Nginx)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ppap-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  # Celery Worker (for background tasks)
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ppap-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://ppap:ppap123@postgres:5432/ppap
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ../backend/app:/app/app

volumes:
  postgres_data:
  redis_data:
  minio_data:
