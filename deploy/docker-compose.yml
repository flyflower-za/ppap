x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ppap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ppap
      POSTGRES_USER: ppap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ppap" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ppap-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ppap-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    logging: *default-logging
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Bucket Initialization (run once, creates bucket and sets access policy)
  minio-init:
    image: minio/mc:latest
    container_name: ppap-minio-init
    entrypoint: ["sh", "-c"]
    command: >
      "mc alias set ppapminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb ppapminio/ppap-files --ignore-existing &&
      mc anonymous set download ppapminio/ppap-files &&
      echo 'MinIO bucket ppap-files initialized'"
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  # Database Initialization (run once on startup, then exits)
  db-init:
    image: postgres:15-alpine
    container_name: ppap-db-init
    environment:
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
    command: >
      sh -c "
      sleep 5 &&
      if ! PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ppap -d ppap -c 'SELECT 1 FROM users' > /dev/null 2>&1; then
        echo 'Initializing database schema...' &&
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ppap -d ppap < /docker-entrypoint-initdb.d/init-db.sql &&
        echo 'Database initialization completed';
      else
        echo 'Database already initialized, running migrations...' &&
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ppap -d ppap < /docker-entrypoint-initdb.d/db_migrations.sql || true;
      fi &&
      if [ -n \"$$ADMIN_PASSWORD_HASH\" ]; then
        echo 'Updating admin password...' &&
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ppap -d ppap -c \"UPDATE users SET password_hash = '$$ADMIN_PASSWORD_HASH' WHERE email = 'admin@example.com';\" &&
        echo 'Admin password updated';
      fi
      "
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ../db_migrations.sql:/docker-entrypoint-initdb.d/db_migrations.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ppap-backend:latest
    container_name: ppap-backend
    restart: unless-stopped
    environment:
      PORT: "31234"
      DATABASE_URL: postgresql+asyncpg://ppap:${POSTGRES_PASSWORD}@postgres:5432/ppap
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "31234:31234"
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "31234", "--workers", "2" ]
    logging: *default-logging
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:31234/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # Frontend (Nginx)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ppap-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro  # optional: overrides built-in config

  # Celery Worker (for background tasks) - reuses backend image
  celery-worker:
    image: ppap-backend:latest
    container_name: ppap-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=3
    environment:
      DATABASE_URL: postgresql+asyncpg://ppap:${POSTGRES_PASSWORD}@postgres:5432/ppap
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --timeout 10 2>/dev/null | grep -q pong" ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres_data:
  redis_data:
  minio_data:
