events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Fix MIME type for .mjs files (PDF.js worker)
    # Must be defined after mime.types include to override
    types {
        application/javascript mjs js;
    }

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Rate limiting zones (per client IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    server {
        listen 80;
        server_name localhost;

        # Use Docker's embedded DNS resolver to dynamically resolve container IPs
        # This prevents 502 Bad Gateway errors if backend container IP changes
        resolver 127.0.0.11 valid=10s;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Fix MIME type for .mjs files (PDF.js worker)
        location ~* \.mjs$ {
            root /usr/share/nginx/html;
            add_header Content-Type application/javascript always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Login endpoint - strict rate limit (10 req/min per IP)
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;

            set $backend_api http://backend:31234;
            proxy_pass $backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API proxy - general rate limit (10 req/s per IP)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            set $backend_api http://backend:31234;
            proxy_pass $backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health check
        location /health {
            set $backend_health http://backend:31234/health;
            proxy_pass $backend_health;
        }

        # MinIO presigned URL proxy
        location /ppap-files/ {
            proxy_pass http://minio:9000/ppap-files/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
