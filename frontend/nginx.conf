events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Fix MIME type for .mjs files (PDF.js worker)
    # Must be defined after mime.types include to override
    types {
        application/javascript mjs js;
    }

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    server {
        listen 80;
        server_name localhost;

        # Use Docker's embedded DNS resolver to dynamically resolve container IPs
        # This prevents 502 Bad Gateway errors if backend container IP changes
        resolver 127.0.0.11 valid=10s;

        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Fix MIME type for .mjs files (PDF.js worker)
        location ~* \.mjs$ {
            root /usr/share/nginx/html;
            add_header Content-Type application/javascript always;
        }

        # API proxy
        location /api/ {
            set $backend_api http://backend:31234;
            proxy_pass $backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health check
        location /health {
            set $backend_health http://backend:31234/health;
            proxy_pass $backend_health;
        }

        # MinIO presigned URL proxy
        location /ppap-files/ {
            proxy_pass http://minio:9000/ppap-files/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
